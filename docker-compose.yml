version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: freelotrack_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelotrack
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
